<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Chat App</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="app-wrapper">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon">⬡</span>
          <span class="logo-text">NeuralChat</span>
        </div>
      </div>
      <button class="new-chat-btn" onclick="clearChat()">
        <span>+</span> New Chat
      </button>
      <div class="chat-history">
        <p class="history-label">Recent</p>
        <div id="historyList"></div>
      </div>
      <div class="sidebar-footer">
        <div class="model-badge">claude-sonnet-4</div>
        <p class="footer-note">Powered by Anthropic</p>
      </div>
    </aside>

    <!-- Main chat area -->
    <main class="chat-main">
      <header class="chat-header">
        <div class="header-left">
          <div class="bot-dot"></div>
          <span class="header-title">AI Assistant</span>
          <span class="header-status">Online</span>
        </div>
        <button class="clear-btn" onclick="clearChat()">Clear Chat</button>
      </header>

      <div class="messages" id="messages">
        <div class="welcome-screen" id="welcomeScreen">
          <div class="welcome-icon">⬡</div>
          <h1 class="welcome-title">How can I help you today?</h1>
          <p class="welcome-sub">Ask me anything — code, ideas, explanations, writing.</p>
          <div class="suggestion-grid">
            <div class="suggest-card" onclick="useSuggestion('Explain how neural networks work')">
              <span class="suggest-icon">🧠</span>
              <span>Explain neural networks</span>
            </div>
            <div class="suggest-card" onclick="useSuggestion('Write a Python function to sort a list of dictionaries by a key')">
              <span class="suggest-icon">🐍</span>
              <span>Write Python code</span>
            </div>
            <div class="suggest-card" onclick="useSuggestion('Give me 5 creative startup ideas for 2025')">
              <span class="suggest-icon">💡</span>
              <span>Brainstorm ideas</span>
            </div>
            <div class="suggest-card" onclick="useSuggestion('Write a short poem about the ocean at night')">
              <span class="suggest-icon">✍️</span>
              <span>Write a poem</span>
            </div>
          </div>
        </div>
      </div>

      <div class="input-area">
        <div class="input-box">
          <textarea
            id="userInput"
            placeholder="Message AI Assistant..."
            rows="1"
            onkeydown="handleKey(event)"
            oninput="autoResize(this)"
          ></textarea>
          <button id="sendBtn" class="send-btn" onclick="sendMessage()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
        <p class="input-note">Press Enter to send · Shift+Enter for new line</p>
      </div>
    </main>

  </div>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
